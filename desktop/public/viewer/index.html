<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stage Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --brand-color: #4f46e5;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 2vmin;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }
        #appContainer {
            width: 100%;
            height: 100%;
            border: 2px solid #1e293b;
            border-radius: clamp(1rem, 3vmin, 2rem);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 40px rgba(79, 70, 229, 0.05);
            overflow: hidden;
        }
        #header {
            padding: clamp(1rem, 2vmin, 1.5rem) clamp(1rem, 3vmin, 2rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            opacity: 0.5;
            flex-shrink: 0;
        }
        #branding {
            font-size: clamp(1rem, 2vmin, 1.2rem);
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #64748b;
        }
        #branding span {
            color: var(--brand-color);
        }
        #contentWrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1rem, 4vmin, 3rem);
            text-align: center;
            transition: opacity 0.5s ease-in-out;
            overflow: hidden;
        }
        #slideContent {
            font-size: clamp(1.2rem, min(6vh, 6.5vw), 5rem);
            font-weight: 800;
            line-height: 1.4;
            width: 100%;
            max-width: 1400px;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #connectionStatus {
            font-size: 0.8rem;
            font-weight: bold;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: none;
        }
        .is-black #contentWrapper {
            opacity: 0;
        }
        
        /* Leader Mode Control Zones */
        #controlsLayer {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 50;
        }
        .tap-zone {
            height: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #prevZone {
            width: 30%;
        }
        #nextZone {
            width: 70%;
        }
        
        /* Visual feedback on tap */
        .tap-zone:active {
            background: rgba(255,255,255,0.03);
        }
    </style>
</head>
<body>

    <div id="appContainer">
        <div id="header">
            <div id="branding">LyriX<span>Stage</span></div>
            <div id="connectionStatus">Offline</div>
        </div>
        
        <div id="contentWrapper">
            <div id="slideContent">Waiting for lyrics...</div>
        </div>

        <!-- Hidden Tap Zones for Two-Way Musician Sync -->
        <div id="controlsLayer">
            <div id="prevZone" class="tap-zone" aria-label="Previous Slide"></div>
            <div id="nextZone" class="tap-zone" aria-label="Next Slide"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const slideContent = document.getElementById('slideContent');
        const connectionStatus = document.getElementById('connectionStatus');
        
        // Connect to the WebSocket server running on the main app
        const socket = io({ query: { type: 'viewer' } });

        socket.on('connect', () => {
            connectionStatus.style.display = 'none';
        });

        socket.on('disconnect', () => {
            connectionStatus.style.display = 'block';
            connectionStatus.textContent = 'Disconnected';
            connectionStatus.style.color = '#ef4444';
        });

        // Update lyrics on screen
        socket.on('current-slide', (data) => {
            if (data && data.slide) {
                slideContent.textContent = data.slide;
            } else {
                slideContent.textContent = '';
            }
        });

        // Handle screen blackout
        socket.on('blank-screen', (isBlack) => {
            if (isBlack) {
                document.body.classList.add('is-black');
            } else {
                document.body.classList.remove('is-black');
            }
        });

        // Two-Way Musician Control (Leader Mode)
        const prevZone = document.getElementById('prevZone');
        const nextZone = document.getElementById('nextZone');
        
        prevZone.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(50);
            socket.emit('command', { action: 'prev-slide', cmdId: Date.now().toString() });
        });
        
        nextZone.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(50);
            socket.emit('command', { action: 'next-slide', cmdId: Date.now().toString() });
        });
    </script>
</body>
</html>
